name: GitHub Snake Game

on:
  # schedule the workflow to run daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # allow manual triggering of the workflow
  workflow_dispatch:

  # trigger the workflow on pushes to the main branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v3

      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            artefacts/github-snake-light.svg
            artefacts/github-snake-dark.svg?palette=github-dark
            artefacts/github-snake-custom.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy To "artefacts" Branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artefacts
          publish_branch: artefacts
          commit_message: "Update Snake Animations"
          force_orphan: true
